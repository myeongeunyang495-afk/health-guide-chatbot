<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>KORAIL 검진관리</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <header class="global-header">
      <a class="korail-logo" href="#" aria-label="KORAIL 검진관리 홈">
        <img src="korail-logo.jpg" alt="KORAIL" />
      </a>
      <div class="header-meta">
        <span>한국철도공사 보건관리</span>
        <strong>KORAIL 검진관리</strong>
      </div>
    </header>

    <main class="app-shell compact-shell">
      <section class="brand-block" aria-labelledby="main-title">
        <div class="brand-copy">
          <p class="eyebrow">KORAIL Health Desk</p>
          <h1 id="main-title">KORAIL 검진관리</h1>
          <p class="brand-summary">검진 안내부터 유해인자 확인까지, 스마트하게 해결하세요.</p>
        </div>
        <img class="brand-visual" src="health-check-illustration.svg" alt="건강검진 상담 일러스트" />
      </section>

      <section class="selector-panel" aria-label="조회 유형과 소속 선택">
        <div class="mode-toggle" role="tablist" aria-label="조회 유형 선택">
          <button id="guideMode" class="active" type="button" data-mode="guide" role="tab" aria-selected="true">
            <strong>소속기관 검진 안내자료 조회</strong>
            <span>선택한 소속기관의 건강진단 안내자료를 확인합니다.</span>
          </button>
          <button id="specialMode" type="button" data-mode="special" role="tab" aria-selected="false">
            <strong>특수검진 대상소속 조회</strong>
            <span>선택한 소속의 특수검진 유해인자를 확인합니다.</span>
          </button>
        </div>

        <p id="modeNote" class="mode-note">⭐ 본인 소속 상관없이 전국 어디서나 건강검진이 가능합니다.</p>

        <div class="organization-group">
          <p class="eyebrow" id="organizationStepLabel">소속 선택</p>
          <h2 id="organizationTitle">소속기관 검진 안내자료 조회</h2>
          <label id="organizationLabel" for="organizationSelect">소속기관</label>
          <select id="organizationSelect"></select>
          <p id="selectionHelp" class="selection-help">선택한 소속기관의 건강진단 안내자료가 아래에 자동으로 표시됩니다.</p>
        </div>
      </section>

      <section class="material-panel" aria-labelledby="materialTitle">
        <div class="material-header">
          <div>
            <p class="eyebrow" id="materialEyebrow">건강진단 안내자료</p>
            <h2 id="materialTitle">본사 2026년 건강진단 직원 안내자료</h2>
          </div>
          <div class="material-actions">
            <a id="downloadLink" class="material-button" href="#" download>PDF 다운로드</a>
          </div>
        </div>

        <div class="viewer-frame">
          <div id="documentViewer" class="page-viewer" aria-label="검진자료 미리보기"></div>
          <div id="viewerFallback" class="viewer-fallback">
            <strong>웹앱 미리보기 안내</strong>
            <p>소속기관을 선택하면 해당 자료가 화면에 표시됩니다.</p>
          </div>
        </div>
      </section>
    </main>

    <button id="chatTrigger" class="floating-chat-btn" aria-label="챗봇 열기" type="button">
      <img src="ai-robot-icon.svg" alt="AI 상담" />
    </button>

    <section id="chatModal" class="chat-modal hidden" aria-labelledby="chat-title">
      <div class="chat-header">
        <div>
          <p class="eyebrow">문의 입력</p>
          <h3 id="chat-title">검진 안내 AI 상담</h3>
        </div>
        <div class="chat-actions">
          <button id="resetChat" type="button">초기화</button>
          <button id="closeChat" type="button">닫기</button>
        </div>
      </div>

      <div id="quickQuestions" class="quick-questions" aria-label="빠른 질문"></div>
      <div id="chatLog" class="chat-log" aria-live="polite"></div>

      <form id="chatForm" class="chat-form">
        <input id="chatInput" type="text" placeholder="예: 특수검진 대상소속은 어디서 조회하나요?" autocomplete="off" />
        <button type="submit">문의</button>
      </form>
    </section>

    <script src="app.js"></script>
  </body>
</html>
